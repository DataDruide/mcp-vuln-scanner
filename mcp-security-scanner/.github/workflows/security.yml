name: MCP Security Scan

on:
  push:
    branches: [main]
    paths:
      - '**/tools.json'
      - '**/mcp-server/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Wöchentlich montags um 00:00

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mcp-vuln-scanner
        run: |
          pip install mcp-vuln-scanner

      - name: Secret Detection
        run: mcp-scan tools.json --secrets --format sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .
