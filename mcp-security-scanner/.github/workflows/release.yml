name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_to_testpypi:
        description: 'If true, publish to TestPyPI instead of PyPI'
        required: false
        default: 'false'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest -q

      - name: Run tests
        run: python -m pytest -q

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI or TestPyPI
        env:
          TWINE_USERNAME: __token__
          # Select token based on input
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.publish_to_testpypi }}" = "true" ]; then
            echo "Publishing to TestPyPI"
            python -m twine upload --repository testpypi dist/* --username "$TWINE_USERNAME" --password "${{ secrets.TEST_PYPI_API_TOKEN }}"
          else
            echo "Publishing to PyPI"
            python -m twine upload dist/* --username "$TWINE_USERNAME" --password "$TWINE_PASSWORD"
          fi
name: Release
on:
  push:
    branches: [main]
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -e .
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Publish to PyPI
        run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

